<!doctype html>
<html lang="pt-BR" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Felipe Pavão." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <title>Felipe Pavão</title>

    <!-- Meta Pixel — client-side + CAPI server-side -->
    <script>
      function getMetaCookie(name) {
        var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? decodeURIComponent(match[2]) : null;
      }

      function setMetaCookie(name, value) {
        document.cookie = name + '=' + encodeURIComponent(value) + '; path=/; max-age=7776000; SameSite=Lax';
      }

      function getOrCreateFbp() {
        var existingFbp = getMetaCookie('_fbp');
        if (existingFbp) return existingFbp;

        var fbp = 'fb.1.' + Date.now() + '.' + Math.floor(Math.random() * 1000000000);
        setMetaCookie('_fbp', fbp);
        return fbp;
      }

      function getFbc() {
        var existingFbc = getMetaCookie('_fbc');
        if (existingFbc) return existingFbc;

        var fbclid = new URLSearchParams(window.location.search).get('fbclid');
        if (!fbclid) return null;

        // Formato recomendado pelo Meta: fb.1.<timestamp_ms>.<fbclid>
        var fbc = 'fb.1.' + Date.now() + '.' + fbclid;
        setMetaCookie('_fbc', fbc);
        return fbc;
      }

      function createMetaEventId() {
        return (typeof crypto !== 'undefined' && crypto.randomUUID)
          ? crypto.randomUUID()
          : Math.random().toString(36).slice(2) + Date.now().toString(36);
      }

      // Gera event_id único compartilhado entre browser e servidor (deduplicacao)
      window.__metaEventId = createMetaEventId();

      // Browser pixel
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window,document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '641093908868814');
      fbq('track', 'PageView', {}, { eventID: window.__metaEventId });

      // CAPI server-side — mesmo event_id para deduplicacao
      fetch('/api/pixel', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          event_name: 'PageView',
          event_id: window.__metaEventId,
          event_source_url: window.location.href,
          fbp: getOrCreateFbp(),
          fbc: getFbc(),
        }),
      }).catch(function() {}); // falha silenciosa
    </script>
    <!-- End Meta Pixel -->
  </head>
  <body class="min-h-screen bg-white text-ink-900 antialiased">
    <noscript>
      <img height="1" width="1" style="display:none"
        src="https://www.facebook.com/tr?id=641093908868814&ev=PageView&noscript=1" />
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
